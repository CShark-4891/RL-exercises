env:
  name: LunarLander-v3

seed: 0

dqn_rnd:
  agent:
    buffer_capacity: 10000
    batch_size: 32
    learning_rate: 0.001
    gamma: 0.99
    epsilon_start: 1.0
    epsilon_final: 0.01
    epsilon_decay: 500
    target_update_freq: 1000

  rnd:
    hidden_size: 128
    n_layers: 2
    learning_rate: 1e-3   # optimizer lr for the RND predictor
    update_freq: 1000     # update RND predictor every N steps
    reward_weight: 0.1    # scale factor applied to raw RND error before adding to reward

  train:
    num_frames: 20000
    eval_interval: 1000

ppo_rnd:
  agent:
    lr_actor: 5e-4
    lr_critic: 1e-3
    gamma: 0.99
    gae_lambda: 0.95
    clip_eps: 0.2
    epochs: 4
    batch_size: 64
    ent_coef: 0.01
    vf_coef: 0.5
    hidden_size: 128

  rnd:
    hidden_size: 128
    n_layers: 2
    update_freq: 4        # update RND predictor every N steps
    reward_weight: 0.1    # scale factor applied to raw RND error before adding to reward

  train:
    total_steps: 20000
    eval_interval: 10000
    eval_episodes: 5

dqn_eq:
  agent:
    buffer_capacity:    10000    # max replay buffer size
    batch_size:         32       # minibatch size
    learning_rate:      0.001    # maps to DQNAgent’s lr
    gamma:              0.99
    epsilon_start:      1.0
    epsilon_final:      0.01
    epsilon_decay:      500
    target_update_freq: 1000
    hidden_dim:          64
    hidden_layers:       2
    double_dqn:          false
    prioritized_replay:  false
    per_alpha:           0.6
    per_beta_start:      0.4
    per_beta_frames:     10000
    per_epsilon:         0.000001

  train:
    num_frames:     20000   # total env steps
    eval_interval:  1000    # print avg reward every this many episodes
